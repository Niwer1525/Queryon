name: Bug Report
title: "[Bug]: "
labels: ["bug"]
type: bug
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Tell us what happened and how to reproduce it. Please be as detailed as possible.
      placeholder: Tell us what you see!
    validations:
      required: true
  - type: textarea
    id: what-did-you-expect-to-happen
    attributes:
      label: What did you expect to happen?
      description: Tell us what you expected to happen and how to reproduce it. Please be as detailed as possible.
      placeholder: Tell us what you expected to see!
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Please copy and paste any relevant log output. This will be automatically formatted into code, so no need for backticks.
      render: shell
    validations:
      required: false
  - type: upload
    id: screenshots
    attributes:
      label: Upload screenshots
      description: If applicable, add screenshots to help explain your problem.
    validations:
      required: false